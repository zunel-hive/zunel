[graph]
targets = [
    { triple = "x86_64-unknown-linux-musl" },
    { triple = "aarch64-unknown-linux-musl" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
]

[advisories]
version = 2
yanked = "deny"
ignore = [
    # rustls-pemfile is unmaintained as of Aug 2025. The advisory itself
    # notes "no safe upgrade is available" — the recommended migration is
    # to `rustls-pki-types::PemObject`, which is a code-level refactor
    # tracked separately. Pulled in transitively via `reqwest -> rustls`,
    # so we can't drop it until upstream rustls cuts a release using the
    # new API. No CVE attached; this is a maintenance signal, not a
    # security issue.
    "RUSTSEC-2025-0134",
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
allow = []
deny = [
    { name = "openssl" },
    { name = "openssl-sys" },
    { name = "native-tls" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
