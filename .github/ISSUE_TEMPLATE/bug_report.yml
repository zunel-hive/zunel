name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug in Zunel. Please fill out the sections below so we can reproduce the issue quickly.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what went wrong.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Configure zunel with ...
        2. Send message ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: |
        Paste any relevant log output. For CLI issues, `zunel agent --logs` is a good starting point.
        For gateway issues, include output from `zunel gateway` or `docker compose logs`.
        **Remember to redact any sensitive information (tokens, API keys, passwords, etc.)**
      render: shell

  - type: input
    id: version
    attributes:
      label: zunel Version
      description: Run `zunel --version` or `pip show zunel`
      placeholder: e.g., 0.1.5
    validations:
      required: true

  - type: dropdown
    id: python_version
    attributes:
      label: Python Version
      description: What Python version are you using?
      options:
        - "3.11"
        - "3.12"
        - "3.13"
        - Other (specify below)
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
        - Docker
        - Other (specify below)
    validations:
      required: true

  - type: dropdown
    id: channel
    attributes:
      label: Runtime Surface
      description: Which part of the lean build were you using?
      options:
        - Local CLI (`zunel agent`)
        - Slack
        - Python SDK
        - Docker / Compose
        - Other (specify below)
    validations:
      required: true

  - type: dropdown
    id: llm_provider
    attributes:
      label: Provider Setup
      description: What kind of OpenAI-compatible endpoint were you using?
      options:
        - Hosted OpenAI-compatible API
        - Local OpenAI-compatible server
        - Internal proxy / gateway
        - Other (specify below)
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration (Optional)
      description: |
        Relevant parts of your zunel configuration. **Remember to redact any sensitive information.**
      render: yaml

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or information that might help.
